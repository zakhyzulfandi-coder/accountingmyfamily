<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/zakhyzulfandi-coder/accountingmyfamily/refs/heads/main/family1.png" />
    <meta name="theme-color" content="#2c3e50" />

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #eee;
        overflow: hidden; 
      }

      .iframe-container {
        width: 100%;
        height: 100dvh; 
        overflow: hidden;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%; /* Tampilan normal, tidak di-crop */
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="iframe-container">
      <iframe
        id="app"
        src="https://script.google.com/a/macros/mutiarailmu.sch.id/s/AKfycbx1Z3Qw065Ea7TZAEIxxiWz-oGQZECWuVxnvuzm3Azju5IU6wu5ZeCBQ1YkOcCx3TeS7g/exec"
        scrolling="yes"
        allowfullscreen="true"
        webkitallowfullscreen="true"
        mozallowfullscreen="true"
        allow="fullscreen; camera; microphone; display-capture; geolocation"
      >
      </iframe>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(() => console.log('PWA Ready'))
            .catch(err => console.log('PWA Error:', err));
        });
      }
    </script>
  </body>
</html>
