<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Keuangan Keluarga</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/zakhyzulfandi-coder/accountingmyfamily/refs/heads/main/family1.png">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/zakhyzulfandi-coder/accountingmyfamily/refs/heads/main/family1.png">
  <meta name="theme-color" content="#003D79">

  <style>
    /* ===== LAYOUT DASAR ===== */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ===== CONTAINER APLIKASI ===== */
    .iframe-container {
      position: relative; /* Penting agar loader menempel di dalam container ini */
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: none; /* Disembunyikan secara default, hanya muncul jika diinstal */
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== CUSTOM LOADER (TAMBAHAN BARU) ===== */
    #customLoader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #eee; /* Warna background sama dengan body */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10; /* Berada di atas iframe */
      transition: opacity 0.5s ease; /* Efek memudar saat menghilang */
    }

    /* Animasi Lingkaran Berputar */
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ccc;
      border-top-color: #003D79;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      color: #003D79;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 16px;
    }

    /* ===== OVERLAY INSTALL ===== */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(44, 62, 80, 1);
      z-index: 999;
    }

    #installPopUp {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      padding: 30px 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      text-align: center;
      width: 80%;
      max-width: 320px;
      font-family: sans-serif;
    }

    #btnInstall {
      background: #003D79;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      margin-top: 15px;
      width: 100%;
      display: block; 
    }

    #resetLink {
      margin-top: 20px;
      font-size: 12px;
      color: #3498db;
      cursor: pointer;
      text-decoration: underline;
      display: none;
    }
  </style>
</head>

<body>

  <div class="iframe-container" id="appContainer">
    
    <div id="customLoader">
      <div class="spinner"></div>
      <div class="loader-text">Menyiapkan Sistem...</div>
    </div>

    <iframe
      id="app"
      src="https://script.google.com/a/macros/mutiarailmu.sch.id/s/AKfycbx1Z3Qw065Ea7TZAEIxxiWz-oGQZECWuVxnvuzm3Azju5IU6wu5ZeCBQ1YkOcCx3TeS7g/exec"
      scrolling="yes"
      onload="hideLoader()" 
      allowfullscreen
      webkitallowfullscreen
      mozallowfullscreen
      allow="fullscreen; camera; microphone; display-capture; geolocation; gyroscope; accelerometer; magnetometer; microphone">
    </iframe>
  </div>

  <div id="overlay">
    <div id="installPopUp">
      <p id="popupTitle" style="margin:0 0 10px 0;color:#003D79;font-weight:bold;font-size:20px;">
        My Keuangan Keluarga
      </p>
      <p id="popupDesc" style="margin:0 0 15px 0;color:#555;font-size:14px;line-height:1.5;">
        Memuat sistem...
      </p>
      <button id="btnInstall">Install</button>
      <p id="resetLink">Saya sudah menghapus aplikasi (Install Ulang)</p>
    </div>
  </div>

  <script>
    /* ===== FUNGSI UNTUK MENGHILANGKAN LOADER (TAMBAHAN BARU) ===== */
    /* ===== FUNGSI UNTUK MENGHILANGKAN LOADER ===== */
function hideLoader() {
  const loader = document.getElementById('customLoader');
  if (loader) {
    // TAHAN LOADER LEBIH LAMA: 
    // Beri jeda 3.5 detik (3500 milidetik) agar garis tipis Google sempat selesai
    setTimeout(() => {
      loader.style.opacity = '0'; // Mulai memudar
      
      setTimeout(() => {
        loader.style.display = 'none'; // Hilangkan sepenuhnya
      }, 500); 
      
    }, 3500); // <--- Kamu bisa mengubah angka 3500 ini. Jika masih terlihat, naikkan jadi 4000 atau 5000.
  }
}

    /* ===== SERVICE WORKER ===== */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Rohis-Mutiara-Ilmu/sw.js')
          .catch(err => console.log('PWA Error:', err));
      });
    }

    /* ===== DOM ELEMENT ===== */
    let deferredPrompt;
    const appContainer = document.getElementById('appContainer');
    const overlay = document.getElementById('overlay');
    const btnInstall = document.getElementById('btnInstall');
    const popupTitle = document.getElementById('popupTitle');
    const popupDesc = document.getElementById('popupDesc');
    const resetLink = document.getElementById('resetLink');

    /* ===== DETEKSI DEVICE & STANDALONE ===== */
    const userAgent = navigator.userAgent || navigator.vendor || window.opera;
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    /* ===== LOGIKA MODE APLIKASI ===== */
    if (!isStandalone) {
      appContainer.style.display = 'none'; 
      overlay.style.display = 'block';     

      popupTitle.innerHTML = 'Install Diperlukan';
      popupDesc.innerHTML = 'Aplikasi ini wajib diinstal ke perangkat Anda (HP/Laptop) untuk dapat digunakan. Klik tombol di bawah untuk menginstal. Apabila tidak muncul, silahkan klik titik tiga 3 di pojok kanan atas kemudian pilih install';
      btnInstall.style.display = 'block';

    } else {
      localStorage.setItem('pwa_installed', 'true');
      overlay.style.display = 'none';       
      appContainer.style.display = 'block'; 
      // Saat appContainer muncul, customLoader otomatis terlihat karena z-index
      // Iframe di bawahnya sedang memuat. Saat selesai, onload memanggil hideLoader()
    }

    /* ===== DETEKSI EVENT INSTALL ===== */
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    /* ===== TOMBOL INSTALL ===== */
    btnInstall.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('Sistem instalasi sedang disiapkan atau browser tidak mendukung tombol otomatis. Gunakan menu Install di browser Anda.');
        return;
      }

      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;

      if (outcome === 'accepted') {
        localStorage.setItem('pwa_installed', 'true');
        popupTitle.innerHTML = 'Instalasi Berhasil';
        popupDesc.innerHTML = 'Silakan tutup browser ini dan buka aplikasi Keuangan Keluarga dari layar utama / desktop Anda.';
        btnInstall.style.display = 'none';
      }
      deferredPrompt = null;
    });

    /* ===== RESET INSTALL ===== */
    resetLink.addEventListener('click', () => {
      localStorage.removeItem('pwa_installed');
      location.reload();
    });

    /* ===== DETEKSI SELESAI INSTALL ===== */
    window.addEventListener('appinstalled', () => {
      localStorage.setItem('pwa_installed', 'true');
      if (!isStandalone) {
        popupTitle.innerHTML = 'Instalasi Selesai';
        popupDesc.innerHTML = 'Silakan tutup browser ini dan buka aplikasi Keuangan Keluarga dari layar utama / desktop Anda.';
        btnInstall.style.display = 'none';
      }
    });

    /* ===== ANTI ZOOM & SCROLLING ===== */
    document.addEventListener('wheel', function (e) {
      if (e.ctrlKey) {
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
        e.preventDefault();
      }
    });

    document.addEventListener('gesturestart', function (e) {
      e.preventDefault();
    });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = (new Date()).getTime();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

  </script>

</body>
</html>
